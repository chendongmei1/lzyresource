<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎰 单词扭蛋机 - 译林英语四年级上册 (2026新版)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'Comic Sans MS', cursive, sans-serif;
            min-height: 100vh;
            background: linear-gradient(180deg, #ffecd2 0%, #fcb69f 50%, #ff9a9e 100%);
            display: flex; align-items: center; justify-content: center;
            padding: 16px;
            overflow-x: hidden;
        }

        /* ===== 浮动泡泡 ===== */
        .bubbles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
            overflow: hidden;
        }
        .bubble {
            position: absolute; bottom: -40px;
            width: 20px; height: 20px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            animation: bubbleRise 8s ease-in infinite;
        }
        @keyframes bubbleRise {
            0% { transform: translateY(0) scale(1); opacity: 0.6; }
            100% { transform: translateY(-110vh) scale(0.3); opacity: 0; }
        }

        /* ===== 主容器 ===== */
        #app {
            position: relative; z-index: 1;
            width: 100%; max-width: 460px;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(16px);
            border-radius: 36px;
            box-shadow: 0 20px 60px rgba(252,182,159,0.4);
            padding: 24px 20px 28px;
            min-height: 520px;
            transition: all 0.3s;
        }

        .screen { display: none; animation: fadeIn 0.5s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pop { 0% { transform: scale(0); opacity: 0; } 60% { transform: scale(1.2); } 100% { transform: scale(1); opacity: 1; } }
        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            20% { transform: rotate(-8deg); }
            40% { transform: rotate(8deg); }
            60% { transform: rotate(-5deg); }
            80% { transform: rotate(5deg); }
        }
        @keyframes dropBounce {
            0% { transform: translateY(-300px) scale(0.5); opacity: 0; }
            50% { transform: translateY(0) scale(1.1); opacity: 1; }
            70% { transform: translateY(-20px) scale(0.95); }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }
        @keyframes spinCrank {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes coinDrop {
            0% { transform: translateY(-60px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(40px) rotate(360deg); opacity: 0; }
        }

        /* ===== 首页 ===== */
        .home-title { text-align: center; margin-bottom: 6px; }
        .home-title .sub { font-size: 13px; color: #999; letter-spacing: 2px; }
        .home-title h1 { font-size: 32px; color: #d96c4a; line-height: 1.3; }
        .home-title h1 .gacha-icon { font-size: 56px; display: block; margin-bottom: 4px; }
        .home-title .desc { color: #888; margin-top: 6px; font-size: 14px; }

        .coin-display {
            background: linear-gradient(135deg, #ffd700, #ffb347);
            border-radius: 20px; padding: 18px 20px;
            display: flex; align-items: center; justify-content: space-between;
            margin: 18px 0 12px;
            box-shadow: 0 4px 15px rgba(255,179,71,0.3);
        }
        .coin-display .label { color: #8b5a2b; font-weight: 600; font-size: 14px; }
        .coin-display .count { font-size: 28px; font-weight: 800; color: #5a3a10; }
        .coin-display .count span { font-size: 16px; font-weight: 400; }

        .home-buttons { display: flex; flex-direction: column; gap: 12px; margin-top: 6px; }
        .btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            padding: 15px 24px; border: none; border-radius: 16px;
            font-size: 17px; font-weight: 700; cursor: pointer;
            transition: all 0.2s; font-family: inherit;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; box-shadow: 0 4px 15px rgba(245,87,108,0.3); }
        .btn-primary:hover { box-shadow: 0 6px 25px rgba(245,87,108,0.4); transform: translateY(-2px); }
        .btn-gold { background: linear-gradient(135deg, #ffd700, #ff8c00); color: #5a3a10; box-shadow: 0 4px 15px rgba(255,140,0,0.3); }
        .btn-gold:hover { box-shadow: 0 6px 25px rgba(255,140,0,0.4); transform: translateY(-2px); }
        .btn-cyan { background: linear-gradient(135deg, #4facfe, #00f2fe); color: white; box-shadow: 0 4px 15px rgba(79,172,254,0.3); }
        .btn-cyan:hover { box-shadow: 0 6px 25px rgba(79,172,254,0.4); transform: translateY(-2px); }
        .btn-purple { background: linear-gradient(135deg, #a18cd1, #fbc2eb); color: #4a2d70; box-shadow: 0 4px 15px rgba(161,140,209,0.3); }
        .btn-outline { background: transparent; color: #d96c4a; border: 2px solid #d96c4a; }
        .btn-small { padding: 10px 16px; font-size: 13px; border-radius: 12px; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
        .btn-pink { background: linear-gradient(135deg, #ff9a9e, #fecfef); color: #8b3a4a; }

        .back-row { display: flex; align-items: center; margin-bottom: 14px; }
        .back-btn { background: none; border: none; font-size: 28px; cursor: pointer; padding: 0 6px; color: #d96c4a; transition: 0.2s; }
        .back-btn:hover { color: #b54a2a; }
        .back-row h2 { flex: 1; text-align: center; font-size: 19px; color: #6b4226; margin-right: 34px; }

        /* ===== 单元选择 ===== */
        .unit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .unit-btn {
            padding: 13px 8px; border: none; border-radius: 14px;
            background: linear-gradient(135deg, #ffecd2, #fcb69f);
            font-size: 13px; font-weight: 600; cursor: pointer;
            transition: all 0.2s; font-family: inherit;
            text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .unit-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .unit-btn:active { transform: scale(0.96); }
        .unit-btn .u-num { font-size: 10px; opacity: 0.6; display: block; }
        .unit-btn .u-name { display: block; font-size: 12px; margin-top: 2px; }
        .unit-btn:nth-child(1) { background: linear-gradient(135deg, #ffecd2, #fcb69f); }
        .unit-btn:nth-child(2) { background: linear-gradient(135deg, #a1c4fd, #c2e9fb); }
        .unit-btn:nth-child(3) { background: linear-gradient(135deg, #fbc2eb, #a6c1ee); }
        .unit-btn:nth-child(4) { background: linear-gradient(135deg, #fddb92, #d1fdff); }
        .unit-btn:nth-child(5) { background: linear-gradient(135deg, #e0c3fc, #8ec5fc); }
        .unit-btn:nth-child(6) { background: linear-gradient(135deg, #fed6e3, #a8edea); }
        .unit-btn:nth-child(7) { background: linear-gradient(135deg, #fddb92, #d1fdff); }
        .unit-btn:nth-child(8) { background: linear-gradient(135deg, #ffecd2, #fcb69f); }
        .unit-btn.all-btn { grid-column: 1 / -1; background: linear-gradient(135deg, #f093fb, #f5576c); color: white; }

        /* ===== 🎰 扭蛋机主体 ===== */
        .machine-wrap {
            position: relative;
            margin: 0 auto 16px;
            width: 280px;
        }

        /* 机器顶部 */
        .machine-top {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            border-radius: 20px 20px 8px 8px;
            padding: 12px 16px 8px;
            text-align: center;
            position: relative;
            box-shadow: 0 -4px 0 #c0392b;
        }
        .machine-top .title-tag {
            font-size: 13px; font-weight: 800; color: #fff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            letter-spacing: 2px;
        }
        .machine-top .coin-slot-area {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-top: 6px;
        }
        .coin-slot {
            width: 20px; height: 24px;
            background: #2d2d2d;
            border-radius: 4px;
            border: 2px solid #555;
            position: relative;
        }
        .coin-slot::after {
            content: ''; position: absolute;
            top: 6px; left: 3px; right: 3px; height: 4px;
            background: #444; border-radius: 2px;
        }
        .coin-in-btn {
            background: #ffd700; border: none;
            width: 46px; height: 28px; border-radius: 6px;
            font-size: 14px; font-weight: 700; cursor: pointer;
            color: #5a3a10; box-shadow: 0 2px 0 #b8860b;
            transition: 0.1s; font-family: inherit;
        }
        .coin-in-btn:active { transform: translateY(2px); box-shadow: none; }
        .coin-in-btn:disabled { opacity: 0.4; transform: none; }
        .coin-in-btn .coin-emoji { display: inline-block; }
        .coin-flying {
            position: absolute; top: 38px; right: 60px;
            font-size: 22px; pointer-events: none;
            animation: coinDrop 0.6s ease-out forwards;
        }

        /* 透明球仓 */
        .ball-bowl {
            background: linear-gradient(180deg, #e8f4f8, #c8e6f0);
            border: 4px solid #74b9ff;
            border-top: none;
            border-radius: 0 0 24px 24px;
            min-height: 160px;
            padding: 12px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 6px;
            position: relative;
            box-shadow: inset 0 8px 20px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .ball-bowl .glass-shine {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, transparent 50%);
            pointer-events: none;
            border-radius: 0 0 20px 20px;
        }

        .mini-ball {
            display: inline-flex; align-items: center; justify-content: center;
            width: 44px; height: 44px; border-radius: 50%;
            font-size: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15), inset 0 -3px 0 rgba(0,0,0,0.1);
            transition: all 0.3s;
            animation: ballFloat 3s ease-in-out infinite;
        }
        .mini-ball:nth-child(2) { animation-delay: 0.5s; }
        .mini-ball:nth-child(3) { animation-delay: 1s; }
        .mini-ball:nth-child(4) { animation-delay: 1.5s; }
        .mini-ball:nth-child(5) { animation-delay: 0.8s; }
        @keyframes ballFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .ball-color-0 { background: linear-gradient(135deg, #ff6b6b, #ee5a24); }
        .ball-color-1 { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .ball-color-2 { background: linear-gradient(135deg, #fbc2eb, #a6c1ee); }
        .ball-color-3 { background: linear-gradient(135deg, #ffd700, #ff8c00); }
        .ball-color-4 { background: linear-gradient(135deg, #2ecc71, #1abc9c); }
        .ball-color-5 { background: linear-gradient(135deg, #fd79a8, #e84393); }

        .ball-bowl-empty {
            display: flex; align-items: center; justify-content: center;
            height: 100%; min-height: 100px;
            color: #90a4ae; font-size: 14px; font-weight: 600;
            width: 100%;
        }

        /* 手柄+出口区域 */
        .machine-bottom {
            display: flex; align-items: center;
            margin-top: -4px;
            position: relative;
        }
        .crank-area {
            flex: 0 0 72px;
            display: flex; align-items: center; justify-content: center;
            height: 72px;
        }
        .crank-btn {
            width: 60px; height: 60px; border-radius: 50%;
            background: linear-gradient(135deg, #dfe6e9, #b2bec3);
            border: 4px solid #636e72;
            cursor: pointer;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            font-size: 22px; font-weight: 800; color: #2d3436;
            box-shadow: 0 4px 0 #636e72, 0 6px 15px rgba(0,0,0,0.15);
            transition: all 0.08s;
            position: relative;
            font-family: inherit;
            line-height: 1;
        }
        .crank-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #636e72, 0 4px 10px rgba(0,0,0,0.15);
        }
        .crank-btn:disabled {
            opacity: 0.4; transform: translateY(2px);
            box-shadow: 0 2px 0 #636e72;
            cursor: not-allowed;
        }
        .crank-btn .crank-label {
            font-size: 9px; font-weight: 600; opacity: 0.7;
        }
        .crank-btn.spinning {
            animation: spinCrank 0.6s ease;
        }

        /* 出口 */
        .chute {
            flex: 1;
            height: 36px;
            background: linear-gradient(180deg, #2d3436, #636e72);
            border-radius: 0 0 18px 18px;
            position: relative;
            margin-right: 20px;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.3);
        }
        .chute::after {
            content: '⬇️ 取蛋口'; position: absolute;
            right: -44px; top: 6px;
            font-size: 10px; color: #999; white-space: nowrap;
        }

        /* ===== 扭蛋胶囊（掉出动画） ===== */
        .capsule-drop {
            position: fixed; top: 30%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 200;
            pointer-events: none;
            animation: dropBounce 0.8s ease forwards;
        }
        .capsule-drop .capsule-body {
            width: 90px; height: 90px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 48px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            border: 4px solid rgba(255,255,255,0.5);
        }

        /* ===== 单词挑战卡片 ===== */
        .challenge-card {
            background: linear-gradient(135deg, #fff5f5, #fff0f6);
            border-radius: 24px;
            padding: 20px 18px 18px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            animation: pop 0.4s ease;
            margin-top: 4px;
        }
        .challenge-card .card-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px;
        }
        .challenge-card .card-tag {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white; padding: 4px 14px; border-radius: 20px;
            font-size: 12px; font-weight: 700;
        }
        .challenge-card .card-unit {
            font-size: 12px; color: #999;
        }
        .challenge-card .card-emoji {
            text-align: center; font-size: 54px;
            margin: 4px 0;
            display: block;
        }
        .challenge-card .card-zh {
            text-align: center; font-size: 26px; font-weight: 800;
            color: #6b4226; margin: 4px 0;
        }
        .challenge-card .card-hint {
            text-align: center; font-size: 13px; color: #bbb;
            margin-bottom: 8px;
        }
        .challenge-card .card-blanks {
            text-align: center; margin: 10px 0; min-height: 50px;
        }
        .challenge-card .card-blanks .bl {
            display: inline-flex; align-items: center; justify-content: center;
            width: 32px; height: 40px; border-bottom: 3px solid #f5576c;
            margin: 0 3px; font-size: 24px; font-weight: 700;
            color: #6b4226; vertical-align: bottom;
            transition: all 0.3s;
        }
        .challenge-card .card-blanks .bl.revealed { animation: pop 0.3s ease; border-bottom-color: #2ecc71; }
        .challenge-card .card-blanks .bl.space { border-bottom: none; width: 12px; }

        .card-input-area {
            display: flex; gap: 8px; margin: 8px 0;
        }
        .card-input-area input {
            flex: 1; padding: 13px 16px; border: 3px solid #f0e0e8;
            border-radius: 14px; font-size: 20px; font-weight: 600;
            outline: none; text-align: center; letter-spacing: 3px;
            text-transform: lowercase; font-family: inherit;
            background: #fffafc; transition: 0.3s;
        }
        .card-input-area input:focus { border-color: #f5576c; box-shadow: 0 0 0 4px rgba(245,87,108,0.12); }
        .card-input-area input.correct { border-color: #2ecc71; background: #f0fff4; }
        .card-input-area input.wrong { border-color: #e74c3c; background: #fff5f5; animation: shake 0.4s; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
        .card-input-area button {
            padding: 13px 20px; border: none; border-radius: 14px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white; font-size: 17px; font-weight: 700; cursor: pointer;
            font-family: inherit; transition: 0.2s;
        }
        .card-input-area button:hover { opacity: 0.9; }
        .card-input-area button:active { transform: scale(0.96); }

        .card-msg { text-align: center; min-height: 28px; font-size: 16px; font-weight: 600; margin: 4px 0; }
        .card-msg.correct { color: #2ecc71; }
        .card-msg.wrong { color: #e74c3c; }
        .card-msg.info { color: #f5576c; }

        .card-actions { display: flex; gap: 8px; margin-top: 6px; }
        .card-actions .btn-small { flex: 1; }

        /* ===== 收集栏 ===== */
        .collection-bar {
            background: linear-gradient(135deg, #faf0fc, #fce4ec);
            border-radius: 16px; padding: 10px 14px;
            margin-top: 14px;
            display: flex; align-items: center; gap: 8px;
        }
        .collection-bar .cb-label {
            font-size: 12px; font-weight: 600; color: #8b5a7a;
            white-space: nowrap;
        }
        .collection-bar .cb-balls {
            display: flex; gap: 2px; flex-wrap: wrap; flex: 1;
        }
        .collection-bar .cb-ball {
            width: 26px; height: 26px; border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 13px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.12);
            transition: 0.3s;
            opacity: 0.4;
        }
        .collection-bar .cb-ball.collected {
            opacity: 1;
            animation: pop 0.4s ease;
        }

        /* ===== 虚拟键盘 ===== */
        .vk { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; margin-top: 10px; padding-top: 10px; border-top: 2px solid #f5e8ee; }
        .vk-key {
            width: 32px; height: 38px; border: none; border-radius: 8px;
            background: #f5e8ee; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: 0.1s; font-family: inherit;
            display: flex; align-items: center; justify-content: center;
        }
        .vk-key:active { background: #f5576c; color: white; transform: scale(0.9); }
        .vk-key.wide { width: 52px; font-size: 11px; }

        /* ===== 结果页 ===== */
        .result-area { text-align: center; }
        .result-area .big-emoji { font-size: 72px; display: block; margin: 6px 0; }
        .result-area .r-title { font-size: 26px; font-weight: 800; color: #6b4226; }
        .result-area .r-sub { font-size: 14px; color: #999; margin: 4px 0 10px; }
        .result-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 14px 0; }
        .result-stats .stat-item {
            background: #faf0fc; border-radius: 14px; padding: 12px 6px;
        }
        .result-stats .stat-item .num { font-size: 22px; font-weight: 800; color: #6b4226; }
        .result-stats .stat-item .label { font-size: 11px; color: #999; }
        .result-balls { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; margin: 12px 0; min-height: 40px; }
        .result-balls .rb-ball {
            width: 38px; height: 38px; border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 18px; box-shadow: 0 2px 6px rgba(0,0,0,0.12);
            animation: pop 0.4s ease backwards;
        }
        .result-rating { font-size: 32px; letter-spacing: 4px; margin: 6px 0; }
        .result-msg-text { font-size: 18px; font-weight: 600; color: #6b4226; margin: 6px 0 14px; }
        .result-btns { display: flex; gap: 8px; flex-wrap: wrap; }
        .result-btns .btn { flex: 1; min-width: 90px; }

        @media (max-width: 420px) {
            #app { padding: 18px 14px; }
            .machine-wrap { width: 240px; }
            .home-title h1 { font-size: 26px; }
            .mini-ball { width: 36px; height: 36px; font-size: 16px; }
            .ball-bowl { min-height: 130px; }
            .challenge-card .card-emoji { font-size: 42px; }
            .challenge-card .card-zh { font-size: 22px; }
            .challenge-card .card-blanks .bl { width: 26px; height: 34px; font-size: 20px; }
            .capsule-drop .capsule-body { width: 70px; height: 70px; font-size: 36px; }
            .vk-key { width: 28px; height: 34px; font-size: 13px; }
            .vk-key.wide { width: 44px; }
        }
    </style>
</head>
<body>

<!-- 浮动泡泡 -->
<div class="bubbles" id="bubbles"></div>

<!-- 主应用 -->
<div id="app">

    <!-- ====== 首页 ====== -->
    <div class="screen active" id="screen-home">
        <div class="home-title">
            <div class="sub">🎯 译林英语 · 四年级上册 · 2026新版</div>
            <h1>
                <span class="gacha-icon">🎰</span>
                单词扭蛋机
            </h1>
            <div class="desc">投币 → 转手柄 → 扭蛋弹出 → 拼写单词！</div>
        </div>

        <!-- 金币显示 -->
        <div class="coin-display">
            <span class="label">🪙 我的扭蛋币</span>
            <span class="count" id="h-coins">10 <span>枚</span></span>
        </div>

        <div class="home-buttons">
            <button class="btn btn-primary" onclick="showUnitSelect('gacha')">🎰 开始扭蛋</button>

const GAME = {

    collectedUnits: new Set(),   // 已收集单元编号

    currentWordIndex: 0,

// ====================================================================
//  工具
// ====================================================================
function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function normalize(s) {
    return s.trim().toLowerCase().replace(/[\s'\-]/g, '');
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function speakWord(word) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(word);
    u.lang = 'en-US'; u.rate = 0.85; u.pitch = 1.0;
    speechSynthesis.speak(u);
}

        b.style.animationDelay = Math.random() * 10 + 's';
        b.style.animationDuration = (6 + Math.random() * 6) + 's';
        c.appendChild(b);

function showUnitSelect(mode) {
    GAME.mode = mode;
    document.getElementById('unit-title').textContent =
        mode === 'study' ? '📖 选择学习单元' : '🎰 选择扭蛋单元';

    const grid = document.getElementById('unit-grid');
    grid.innerHTML = '';
    for (let u = 1; u <= 8; u++) {
        const btn = document.createElement('button');
        btn.className = 'unit-btn';
        const collected = GAME.collectedUnits.has(u) ? ' 🏆' : '';
        btn.innerHTML = `<span class="u-num">Unit ${u}</span><span class="u-name">${WORDS[u].name}${collected}</span>`;
        btn.onclick = () => {
            GAME.currentUnit = u;
            if (mode === 'study') startStudy(u);
            else startGacha(u);
        };
        grid.appendChild(btn);
    }
    if (mode === 'gacha') {
        const all = document.createElement('button');
        all.className = 'unit-btn all-btn';
        all.textContent = '🔀 随机扭蛋（全部单元）';
        all.onclick = () => { GAME.currentUnit = 'all'; startGacha('all'); };
        grid.appendChild(all);
    }
    showScreen('screen-units');
}

// ====================================================================
//  📖 学习模式
// ====================================================================
function startStudy(unit) {
    const words = unit === 'all'
        ? Object.values(WORDS).flatMap(u => u.words)
        : [...WORDS[unit].words];
    studyState.words = words;
    studyState.index = 0;
    document.getElementById('study-title').textContent = `📖 Unit ${unit} — ${WORDS[unit]?.name || '全部'}`;
    showScreen('screen-study');
    showStudyWord();
}

function showStudyWord() {
    const { words, index } = studyState;
    if (!words.length || index < 0 || index >= words.length) return;
    const w = words[index];
    document.getElementById('s-emoji').textContent = w.emoji || '📖';
    document.getElementById('s-en').textContent = w.en;
    document.getElementById('s-zh').textContent = w.zh;
    document.getElementById('s-count').textContent = `${index + 1} / ${words.length}`;
}

function studyPrev() { if (studyState.index > 0) { studyState.index--; showStudyWord(); } }
function studyNext() { if (studyState.index < studyState.words.length - 1) { studyState.index++; showStudyWord(); } }
function goGachaFromStudy() { showUnitSelect('gacha'); }

// ====================================================================
//  🎰 扭蛋机 — 主游戏
// ====================================================================
function startGacha(unit) {
    // 准备单词
    const words = unit === 'all'
        ? shuffleArray(Object.values(WORDS).flatMap(u => u.words.map(w => ({ ...w, _unit: u }))))
        : shuffleArray([...WORDS[unit].words]);

    GAME.shuffledWords = words;
    GAME.currentWordIndex = 0;
    GAME.correctCount = 0;
    GAME.wrongCount = 0;
    GAME.coinsEarned = 0;
    GAME.isPlaying = false;

    // 更新扭蛋机
    updateMachineUI();
    showScreen('screen-gacha');
    renderBowlBalls();
    renderCollectionBar();
    document.getElementById('challenge-area').innerHTML = '';
}

function updateMachineUI() {
    const hasCoins = GAME.coins > 0 && GAME.currentWordIndex < GAME.shuffledWords.length;
    const coinBtn = document.getElementById('coin-btn');
    coinBtn.disabled = !hasCoins;
    coinBtn.innerHTML = hasCoins ? '<span class="coin-emoji">🪙</span>' : '✖';
    document.getElementById('coin-count-label').textContent = '×' + GAME.coins;
    document.getElementById('crank-btn').disabled = !hasCoins;
}

function renderBowlBalls() {
    const bowl = document.getElementById('ball-bowl');
    const empty = document.getElementById('bowl-empty');
    // 取出 mini ball（保留玻璃光泽）
    bowl.querySelectorAll('.mini-ball').forEach(el => el.remove());

    const remaining = GAME.shuffledWords.length - GAME.currentWordIndex;
    const maxBalls = Math.min(remaining, 10);

    if (maxBalls === 0) {
        empty.style.display = 'flex';
        empty.textContent = '🎉 全部扭完了！';
        return;
    }
    empty.style.display = 'none';

    for (let i = 0; i < maxBalls; i++) {
        const ball = document.createElement('span');
        ball.className = `mini-ball ball-color-${i % 6}`;
        const emojis = ['⭐','🌟','✨','💫','🎯','🌈'];
        ball.textContent = emojis[i % emojis.length];
        ball.style.animationDelay = (i * 0.15) + 's';
        bowl.appendChild(ball);
    }
}

function renderCollectionBar() {
    const bar = document.getElementById('cb-balls');
    bar.innerHTML = '';
    for (let u = 1; u <= 8; u++) {
        const ball = document.createElement('span');
        ball.className = 'cb-ball' + (GAME.collectedUnits.has(u) ? ' collected' : '');
        const colors = ['#ff6b6b','#4facfe','#fbc2eb','#ffd700','#2ecc71','#fd79a8','#a29bfe','#e17055'];
        ball.style.background = colors[u - 1];
        const icons = ['📚','🌞','📅','⚽','🪆','🌤️','🌸','👚'];
        ball.textContent = icons[u - 1];
        ball.title = `Unit ${u}`;
        bar.appendChild(ball);
    }
}

// ====================================================================
//  🪙 投币 & 🔧 转手柄
// ====================================================================
let crankLocked = false;

function pullCrank() {
    if (crankLocked || GAME.coins <= 0 || GAME.currentWordIndex >= GAME.shuffledWords.length) return;
    if (GAME.isPlaying) return; // 已经在挑战中

    crankLocked = true;
    const btn = document.getElementById('crank-btn');
    btn.classList.add('spinning');

    // 花费金币
    GAME.coins--;
    GAME.isPlaying = true;
    updateMachineUI();

    // 飞币动画
    const coinFly = document.createElement('div');
    coinFly.className = 'coin-flying';
    coinFly.textContent = '🪙';
    document.querySelector('.machine-top').appendChild(coinFly);
    setTimeout(() => coinFly.remove(), 700);

    // 手柄转完 → 扭蛋弹出
    setTimeout(() => {
        btn.classList.remove('spinning');
        crankLocked = false;
        // 移除一颗球
        renderBowlBalls();
        // 扭蛋弹出动画
        showCapsuleDrop();
    }, 650);
}

function showCapsuleDrop() {
    const area = document.getElementById('capsule-anim-area');
    area.innerHTML = '';

    const w = GAME.shuffledWords[GAME.currentWordIndex];
    if (!w) return;

    const idx = GAME.currentUnit === 'all' ? w._unit : GAME.currentUnit;
    const colors = ['#ff6b6b','#4facfe','#fbc2eb','#ffd700','#2ecc71','#fd79a8','#a29bfe','#e17055'];
    const c = colors[(idx - 1) % 8];

    const div = document.createElement('div');
    div.className = 'capsule-drop';
    div.innerHTML = `<div class="capsule-body" style="background:linear-gradient(135deg,${c},${c}dd);">${w.emoji || '🎯'}</div>`;
    area.appendChild(div);

    // 音效（视觉替代）
    setTimeout(() => {
        div.remove();
        // 弹出挑战卡片
        showChallengeCard(w);
    }, 900);
}

// ====================================================================
//  ✍️ 单词挑战卡片
// ====================================================================
function showChallengeCard(w) {
    GAME.revealed = new Array(w.en.length).fill(false);
    GAME.usedHint = false;

    const area = document.getElementById('challenge-area');
    const idx = GAME.currentUnit === 'all' ? w._unit : GAME.currentUnit;

    let blanksHTML = '';
    for (let i = 0; i < w.en.length; i++) {
        const ch = w.en[i];
        if (ch === ' ') blanksHTML += `<span class="bl space"> </span>`;
        else blanksHTML += `<span class="bl" data-i="${i}">_</span>`;
    }

    area.innerHTML = `
        <div class="challenge-card">
            <div class="card-header">
                <span class="card-tag">🎰 扭蛋 ${GAME.currentWordIndex + 1}/${GAME.shuffledWords.length}</span>
                <span class="card-unit">Unit ${idx}</span>
            </div>
            <span class="card-emoji">${w.emoji || '🎯'}</span>
            <div class="card-zh">${w.zh}</div>
            <div class="card-hint">输入对应的英文单词</div>
            <div class="card-blanks">${blanksHTML}</div>
            <div class="card-input-area">
                <input type="text" id="gacha-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="拼写..." onkeydown="if(event.key==='Enter')submitGacha()">
                <button onclick="submitGacha()">↵</button>
            </div>
            <div class="card-msg" id="gacha-msg"></div>
            <div class="card-actions">
                <button class="btn btn-small btn-purple" onclick="gachaHint()">💡 提示</button>
                <button class="btn btn-small btn-outline" onclick="gachaSkip()">⏭ 跳过</button>
                <button class="btn btn-small btn-pink" onclick="toggleGachaKeyboard()" id="gk-toggle">⌨️ 键盘</button>
            </div>
            <div class="vk" id="gacha-vk" style="display:none;"></div>
        </div>
    `;

    const input = document.getElementById('gacha-input');
    if (input) input.focus();
}

function updateBlanks(en) {
    const blanks = document.querySelectorAll('.card-blanks .bl');
    let i = 0;
    for (let j = 0; j < en.length; j++) {
        if (en[j] === ' ') continue;
        const bl = blanks[i];
        if (bl) {
            if (GAME.revealed[j]) {
                bl.textContent = en[j];
                bl.classList.add('revealed');
            } else {
                bl.textContent = '_';
                bl.classList.remove('revealed');
            }
        }
        i++;
    }
}

// ====================================================================
//  ✅ 提交 & 提示 & 跳过
// ====================================================================
function submitGacha() {
    if (!GAME.isPlaying) return;
    const w = GAME.shuffledWords[GAME.currentWordIndex];
    if (!w) return;

    const input = document.getElementById('gacha-input');
    if (!input) return;
    const answer = input.value.trim().toLowerCase();
    if (!answer) { input.focus(); return; }

    const normalizedCorrect = normalize(w.en);
    const normalizedAnswer = normalize(answer);

    if (normalizedAnswer === normalizedCorrect) {
        // ✅ 正确！
        input.className = 'correct';
        input.disabled = true;
        GAME.correctCount++;

        let coinsEarn = GAME.usedHint ? 1 : 2;
        if (!GAME.usedHint) {
            // 连对奖励
            if (GAME.correctCount >= 3) coinsEarn = 3;
            if (GAME.correctCount >= 5) coinsEarn = 4;
        }
        GAME.coins += coinsEarn;
        GAME.coinsEarned += coinsEarn;

        // 揭示全部
        GAME.revealed = GAME.revealed.map(() => true);
        updateBlanks(w.en);

        const msg = document.getElementById('gacha-msg');
        const msgs = ['太棒了！🌟','真厉害！💪','答对啦！✨','好聪明！🧠','Perfect！🎯'];
        msg.textContent = `${msgs[Math.floor(Math.random() * msgs.length)]} +${coinsEarn}🪙`;
        msg.className = 'card-msg correct';

        // 庆祝
        celebrateGacha();

        // 收集判定
        const unitToCollect = GAME.currentUnit === 'all' ? w._unit : GAME.currentUnit;
        GAME.collectedUnits.add(unitToCollect);
        renderCollectionBar();
        saveCollection();

        // 下一个
        setTimeout(() => nextGachaWord(), 1500);

    } else {
        // ❌ 错误
        input.className = 'wrong';
        GAME.wrongCount++;

        const msg = document.getElementById('gacha-msg');
        msg.textContent = '再想想哦！🤔';
        msg.className = 'card-msg wrong';

        setTimeout(() => {
            input.className = '';
            input.value = '';
            input.focus();
            msg.textContent = '';
            msg.className = 'card-msg';
        }, 800);
    }
}

function gachaHint() {
    if (!GAME.isPlaying) return;
    const w = GAME.shuffledWords[GAME.currentWordIndex];
    if (!w) return;

    const unrevealed = [];
    for (let i = 0; i < w.en.length; i++) {
        if (w.en[i] !== ' ' && !GAME.revealed[i]) unrevealed.push(i);
    }
    if (!unrevealed.length) return;

    const idx = unrevealed[Math.floor(Math.random() * unrevealed.length)];
    GAME.revealed[idx] = true;
    GAME.usedHint = true;
    updateBlanks(w.en);

    const msg = document.getElementById('gacha-msg');
    msg.textContent = '💡 给你一个小提示！';
    msg.className = 'card-msg info';
    setTimeout(() => {
        const m = document.getElementById('gacha-msg');
        if (m && m.textContent === '💡 给你一个小提示！') {
            m.textContent = '';
            m.className = 'card-msg';
        }
    }, 1200);
}

function gachaSkip() {
    if (!GAME.isPlaying) return;
    const w = GAME.shuffledWords[GAME.currentWordIndex];
    if (!w) return;

    GAME.wrongCount++;
    GAME.revealed = GAME.revealed.map(() => true);
    updateBlanks(w.en);

    const msg = document.getElementById('gacha-msg');
    msg.textContent = `⏭ 答案是: ${w.en}`;
    msg.className = 'card-msg info';

    setTimeout(() => nextGachaWord(), 1500);
}

function nextGachaWord() {
    GAME.currentWordIndex++;
    GAME.isPlaying = false;

    if (GAME.currentWordIndex >= GAME.shuffledWords.length) {
        // 整个单元完成
        renderBowlBalls();
        updateMachineUI();
        document.getElementById('challenge-area').innerHTML = '';
        showGachaResult();
        return;
    }

    updateMachineUI();
    renderBowlBalls();

    // 检查是否还有硬币，没有则显示提示
    if (GAME.coins <= 0) {
        document.getElementById('challenge-area').innerHTML = `
            <div class="challenge-card" style="text-align:center;padding:30px 16px;">
                <div style="font-size:48px;">😅</div>
                <div style="font-size:18px;font-weight:600;color:#6b4226;margin:8px 0;">扭蛋币用完了！</div>
                <div style="font-size:14px;color:#999;margin-bottom:16px;">答对扭蛋赚币，或返回首页有每日赠送</div>
                <div style="display:flex;gap:10px;justify-content:center;">
                    <button class="btn btn-gold btn-small" onclick="earnFreeCoins()">🎁 领免费币</button>
                    <button class="btn btn-outline btn-small" onclick="showHome()">🏠 首页</button>
                </div>
            </div>
        `;
    }
}

function earnFreeCoins() {
    GAME.coins += 5;
    updateMachineUI();
    document.getElementById('challenge-area').innerHTML = `
        <div class="challenge-card" style="text-align:center;padding:30px 16px;">
            <div style="font-size:48px;">🎁</div>
            <div style="font-size:18px;font-weight:600;color:#6b4226;margin:8px 0;">获得 5 枚免费扭蛋币！</div>
            <div style="font-size:14px;color:#999;margin-bottom:16px;">继续扭蛋吧！</div>
            <button class="btn btn-primary btn-small" onclick="startGacha(GAME.currentUnit)">🎰 继续扭蛋</button>
        </div>
    `;
    renderBowlBalls();
}

// ====================================================================
//  🎊 庆祝
// ====================================================================
function celebrateGacha() {
    // 彩纸
    const container = document.createElement('div');
    container.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100;';
    const colors = ['#FF6B6B','#4ECDC4','#FFE66D','#A78BFA','#FB923C','#2ECC71','#F093FB','#ffd700'];
    for (let i = 0; i < 24; i++) {
        const p = document.createElement('div');
        p.style.cssText = `position:absolute;left:${Math.random()*100}%;top:-8px;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;background:${colors[i%colors.length]};border-radius:${Math.random()>0.5?'50%':'2px'};animation:confettiFall${2+Math.random()*1.5}s ease-out forwards;animation-delay:${Math.random()*0.6}s;`;
        container.appendChild(p);
    }
    document.body.appendChild(container);
    setTimeout(() => container.remove(), 3000);

    speakWord(GAME.shuffledWords[GAME.currentWordIndex]?.en || '');
}

// 额外关键帧注入
(function injectKeyframes() {
    const style = document.createElement('style');
    style.textContent = `
        @keyframes confettiFall {
            0% { opacity:1; transform:translateY(-10px) rotate(0deg) scale(1); }
            100% { opacity:0; transform:translateY(100vh) rotate(720deg) scale(0.4); }
        }
    `;
    document.head.appendChild(style);
})();

// ====================================================================
//  ⌨️ 虚拟键盘
// ====================================================================
function toggleGachaKeyboard() {
    const vk = document.getElementById('gacha-vk');
    if (!vk) return;
    if (vk.style.display === 'flex') {
        vk.style.display = 'none';
        document.getElementById('gk-toggle').textContent = '⌨️ 键盘';
    } else {
        vk.style.display = 'flex';
        document.getElementById('gk-toggle').textContent = '🖋️ 手写';
        buildGachaKeyboard();
    }
}

function buildGachaKeyboard() {
    const vk = document.getElementById('gacha-vk');
    if (!vk) return;
    vk.innerHTML = '';
    const rows = ['qwertyuiop', 'asdfghjkl', 'zxcvbnm'];
    for (const row of rows) {
        for (const ch of row) {
            const btn = document.createElement('button');
            btn.className = 'vk-key';
            btn.textContent = ch;
            btn.onclick = () => {
                const input = document.getElementById('gacha-input');
                if (input && !input.disabled) { input.value += ch; input.focus(); }
            };
            vk.appendChild(btn);
        }
    }
    const bs = document.createElement('button');
    bs.className = 'vk-key wide';
    bs.textContent = '⌫';
    bs.onclick = () => {
        const input = document.getElementById('gacha-input');
        if (input && !input.disabled) { input.value = input.value.slice(0, -1); input.focus(); }
    };
    vk.appendChild(bs);
    const sp = document.createElement('button');
    sp.className = 'vk-key wide';
    sp.textContent = '␣ 空格';
    sp.onclick = () => {
        const input = document.getElementById('gacha-input');
        if (input && !input.disabled) { input.value += ' '; input.focus(); }
    };
    vk.appendChild(sp);
    const go = document.createElement('button');
    go.className = 'vk-key';
    go.style.background = 'linear-gradient(135deg,#f093fb,#f5576c)';
    go.style.color = 'white';
    go.textContent = '↵';
    go.onclick = submitGacha;
    vk.appendChild(go);
}

// ====================================================================
//  🏆 结果
// ====================================================================
function showGachaResult() {
    const total = GAME.correctCount + GAME.wrongCount;
    const rate = total > 0 ? Math.round((GAME.correctCount / total) * 100) : 0;

    let stars = '⭐';
    if (rate >= 90) stars = '⭐⭐⭐';
    else if (rate >= 60) stars = '⭐⭐';

    let msg = '继续加油哦！💪';
    if (rate >= 90) msg = '满分通关！单词大王就是你！🏆✨';
    else if (rate >= 60) msg = '真不错！继续努力！🌟';

    document.getElementById('r-emoji').textContent = rate >= 90 ? '🏆' : rate >= 60 ? '🌟' : '💪';
    document.getElementById('r-sub').textContent = `Unit ${GAME.currentUnit} — ${WORDS[GAME.currentUnit]?.name || '全部'} 完成！`;
    document.getElementById('r-stars').textContent = stars;
    document.getElementById('r-correct').textContent = GAME.correctCount;
    document.getElementById('r-wrong').textContent = GAME.wrongCount;
    document.getElementById('r-coins').textContent = GAME.coinsEarned;
    document.getElementById('r-msg').textContent = msg;

    showScreen('screen-result');
}

function restartGacha() {
    if (GAME.currentUnit) {
        startGacha(GAME.currentUnit);
    } else {
        showUnitSelect('gacha');
    }
}

// ====================================================================
//  🏆 收藏集
// ====================================================================
function showCollection() {
    const grid = document.getElementById('collection-grid');
    grid.innerHTML = '';
    const colors = ['#ff6b6b','#4facfe','#fbc2eb','#ffd700','#2ecc71','#fd79a8','#a29bfe','#e17055'];
    const icons = ['📚','🌞','📅','⚽','🪆','🌤️','🌸','👚'];

    for (let u = 1; u <= 8; u++) {
        const div = document.createElement('div');
        const collected = GAME.collectedUnits.has(u);
        div.style.cssText = `
            background: ${collected ? colors[u-1] : '#eee'};
            border-radius: 16px; padding: 16px 8px; text-align: center;
            box-shadow: ${collected ? '0 4px 15px ' + colors[u-1] + '66' : 'inset 0 2px 6px rgba(0,0,0,0.06)'};
            transition: 0.3s;
            ${collected ? '' : 'filter: grayscale(1);'}
        `;
        div.innerHTML = `
            <div style="font-size:32px;margin-bottom:4px;">${collected ? icons[u-1] : '❓'}</div>
            <div style="font-size:11px;font-weight:600;color:${collected ? '#fff' : '#bbb'};">Unit ${u}</div>
            <div style="font-size:9px;color:${collected ? 'rgba(255,255,255,0.8)' : '#ccc'};margin-top:2px;">${collected ? WORDS[u].name : '???'}</div>
        `;
        grid.appendChild(div);
    }

    const count = GAME.collectedUnits.size;
    document.getElementById('collection-msg').textContent = count >= 8 ? '🎉 全部收集完成！太棒了！' : `已收集 ${count}/8 个单元扭蛋，继续加油！`;

    showScreen('screen-collection');
}

// ====================================================================
//  💾 localStorage 保存
// ====================================================================
function saveCollection() {
    try {
        const data = {
            coins: GAME.coins,
            collected: [...GAME.collectedUnits],
        };
        localStorage.setItem('gacha_yilin4a', JSON.stringify(data));
    } catch(e) {}
}

function loadCollection() {
    try {
        const raw = localStorage.getItem('gacha_yilin4a');
        if (raw) {
            const data = JSON.parse(raw);
            GAME.coins = data.coins ?? 10;
            if (data.collected) data.collected.forEach(u => GAME.collectedUnits.add(u));
        }
    } catch(e) {}
}

// ====================================================================
//  🚀 初始化
// ====================================================================
loadCollection();
// 每日首次赠送
(function dailyBonus() {
    try {
        const today = new Date().toDateString();
        const last = localStorage.getItem('gacha_yilin4a_lastvisit');
        if (last !== today) {
            GAME.coins += 5;
            localStorage.setItem('gacha_yilin4a_lastvisit', today);
            saveCollection();
        }
    } catch(e) {}
})();

showHome();
</script>
